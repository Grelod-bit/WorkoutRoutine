<!doctype html>
<html>
  <head>
    <title>Edit</title>
  </head>

  <body>
    <h1>Edit</h1>
    <p>
      <a href="/">Front Page</a>
    </p>

    <form action="/update_workout" method="post">
      <p>
        Title: <br />
        <input
          type="text"
          name="title"
          maxlength="50"
          required
          value="{{workout.title}}"
        />
      </p>
      <p>
        Description: <br />
        <textarea
        name="description"
        rows="8"
        cols="60
        maxlength="1000" required>{{workout.description}}</textarea>
      </p>

      <input type="hidden" name="workout_id" value="{{ workout.id }}" />
      {% for class in all_classes %}
      <p>
        {{ class }}: <br />
        {% for option in all_classes[class] %}

          {% if option in classes[class] %}
          <input type="checkbox" name="classes" value="{{ class }}:{{ option }}" checked /> {{ option }} <br />
          {% else %}
          <input type="checkbox" name="classes" value="{{ class }}:{{ option }}" /> {{ option }} <br />
          {% endif %}
        {% endfor %}

      </p>
      {% endfor %}
      <input type="submit" value="Update" />
    </form>
  </body>
</html>
