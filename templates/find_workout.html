{% extends "layout.html" %} {% block title %}Search{% endblock %} {% block
content %}
<h2>Search</h2>
<form action="/find_workout" method="get">
  <p>
    <label for="query">Keyword </label>:
    <input
      type="text"
      name="query"
      id="query"
      value="{{ query }}"
      pattern="[A-Za-z0-9\s]*[A-Za-z0-9][A-Za-z0-9\s]*"
      title="Enter at least one letter or number; punctuation-only searches are not allowed."
    />
  </p>
  <input type="submit" value="Search" />
</form>

{% if query %}
<h3>Results</h3>

<ul>
  {% for workout in results %}
  <li><a href="/workout/{{ workout.id }}">{{ workout.title }}</a></li>
  {% else %}
  <p>No matches found.</p>
  {% endfor %}
</ul>
{% endif %} {% endblock %}
