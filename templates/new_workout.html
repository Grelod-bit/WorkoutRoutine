{% extends "layout.html" %} 

{% block title %}New Workout{% endblock %} 

{%block content %}
<body>
  <h2>Workout Routine</h2>

  <form action="/create_workout" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" maxlength="50" required />
    </p>

    <p>
      Description: <br />
      <textarea
        name="description"
        rows="8"
        cols="60"
        maxlength="1000"
        required
      ></textarea>
    </p>

    {% for class in classes %}
    <p>
      {{ class }}: <br />
      {% for option in classes[class] %}
      <input
        type="checkbox"
        name="classes"
        value="{{ class }}:{{ option }}"
      />
      {{ option }} <br />
      {% endfor %}
    </p>
    {% endfor %}
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Create" />
{% endblock %}
