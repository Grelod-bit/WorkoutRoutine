{% extends "layout.html" %} {% block title %}Rate Workout{% endblock %} {%block
content %}
<body>
  <h2>Rate {{ workout.title }}</h2>
  <form action="/rate_workout" method="post">
    <p>
      <label for="rating"> rate 0 / 10: </label> <br />
      <input
        type="text"
        name="rating"
        id="rating"
        size="2"
        maxlength="2"
        required
        pattern="0|[1-9]|10"
        title="Enter a number from 0 to 10"
      />
    </p>

    <p>
      <label for="comment">Comment: </label> <br />
      <textarea
        name="comment"
        id="comment"
        rows="5"
        cols="45"
        maxlength="1000"
        required
      ></textarea>
    </p>
    <input type="hidden" name="workout_id" value="{{ workout.id }}" />
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="rate" />
    {% endblock %}
  </form>
</body>
